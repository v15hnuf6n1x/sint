<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1>
    <form id="todo-form">
      <input type="text" id="task-input" placeholder="Enter a new task..." autofocus>
      <button type="submit">Add</button>
    </form>
    <p id="error-msg" class="error"></p>
    <ul id="task-list"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
